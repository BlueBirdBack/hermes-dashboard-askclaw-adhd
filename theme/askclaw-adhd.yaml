# AskClaw ADHD is a Hermes Agent Dashboard theme.
# It uses the AskClaw pre-KB visual baseline with a Signal Sky blue palette.
name: askclaw-adhd
label: AskClaw ADHD
description: Hermes Agent Dashboard theme with Signal Sky blue surfaces, rectangular chrome, and system font.

palette:
  background:
    hex: "#eef8ff"
    alpha: 1
  midground:
    hex: "#102447"
    alpha: 1
  foreground:
    hex: "#1f5fbf"
    alpha: 0.12
  warmGlow: "rgba(31, 95, 191, 0.08)"
  noiseOpacity: 0.08

typography:
  fontSans: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  fontMono: "'SF Mono', Monaco, Consolas, ui-monospace, monospace"
  baseSize: "15px"
  lineHeight: "1.55"
  letterSpacing: "0"

layout:
  radius: "0"
  density: comfortable

layoutVariant: standard

colorOverrides:
  card: "#fbfdff"
  cardForeground: "#102447"
  popover: "#fbfdff"
  popoverForeground: "#102447"
  primary: "#1f5fbf"
  primaryForeground: "#ffffff"
  secondary: "#edf6ff"
  secondaryForeground: "#102447"
  muted: "#edf6ff"
  mutedForeground: "#506886"
  accent: "#dbeafe"
  accentForeground: "#102447"
  destructive: "#e53e3e"
  destructiveForeground: "#ffffff"
  success: "#16a34a"
  warning: "#d97706"
  border: "#c9def5"
  input: "#c9def5"
  ring: "#1f5fbf"

componentStyles:
  card:
    background: "#fbfdff"
    boxShadow: "0 1px 3px rgba(16, 36, 71, 0.08)"
  header:
    background: "#fbfdff"
  sidebar:
    background: "#edf6ff"
  tab:
    background: "transparent"
  page:
    background: "#eef8ff"

customCSS: |
  :root {
    --font-mondwest: var(--theme-font-sans) !important;
    --font-expanded: var(--theme-font-sans) !important;
    --font-courier: var(--theme-font-mono) !important;
    --askclaw-bg: #eef8ff;
    --askclaw-card: #fbfdff;
    --askclaw-bg2: #edf6ff;
    --askclaw-bg3: #dbeafe;
    --askclaw-text: #102447;
    --askclaw-text2: #506886;
    --askclaw-text3: #6f8199;
    --askclaw-accent: #1f5fbf;
    --askclaw-accent2: #184a9a;
    --askclaw-cyan: #38d5e8;
    --askclaw-border: #c9def5;
    --askclaw-input-bg: #fbfdff;
    --askclaw-radius: 0;
    --theme-radius: 0 !important;
    --radius: 0 !important;
    --askclaw-shadow: 0 1px 3px rgba(16, 36, 71, 0.08);
  }

  body {
    background: var(--askclaw-bg) !important;
    color: var(--askclaw-text) !important;
    text-transform: none !important;
  }

  #root > div,
  .uppercase,
  [class*="uppercase"] {
    text-transform: none !important;
  }

  .font-mondwest,
  [class*="font-mondwest"],
  .font-expanded,
  [class*="font-expanded"] {
    font-family: var(--theme-font-sans) !important;
    letter-spacing: 0 !important;
  }

  .font-mono,
  [class*="font-mono"] {
    font-family: var(--theme-font-mono) !important;
  }

  [style*="plus-lighter"] {
    mix-blend-mode: normal !important;
  }

  #app-sidebar {
    color: var(--askclaw-text) !important;
  }

  #app-sidebar a,
  #app-sidebar button {
    font-size: 0.875rem !important;
    letter-spacing: 0 !important;
  }

  #app-sidebar a.opacity-60 {
    opacity: 0.78 !important;
  }

  #app-sidebar .opacity-30 {
    opacity: 0.5 !important;
  }

  ::selection {
    background: rgba(31, 95, 191, 0.22);
    color: var(--askclaw-text);
  }

  header,
  footer {
    background: var(--askclaw-bg) !important;
    border-color: var(--askclaw-border) !important;
    box-shadow: none !important;
  }

  input,
  textarea,
  select,
  [role="combobox"] {
    background: var(--askclaw-input-bg) !important;
    border-color: var(--askclaw-border) !important;
    color: var(--askclaw-text) !important;
    border-radius: var(--askclaw-radius) !important;
  }

  input:focus,
  textarea:focus,
  select:focus,
  [role="combobox"]:focus {
    border-color: var(--askclaw-accent) !important;
    box-shadow: 0 0 0 2px rgba(31, 95, 191, 0.12) !important;
  }

  [class*="bg-card"] {
    background: var(--askclaw-card) !important;
    border-color: var(--askclaw-border) !important;
    box-shadow: var(--askclaw-shadow) !important;
  }

  [class*="bg-muted"],
  [class*="bg-secondary"] {
    background: var(--askclaw-bg2) !important;
  }

  [class*="text-muted"] {
    color: var(--askclaw-text2) !important;
  }

  button,
  a,
  [role="button"] {
    border-radius: var(--askclaw-radius) !important;
  }

  [class*="rounded"],
  [class*="radius"],
  [class*="hermes-kanban"],
  [data-slot="card"],
  [data-slot="button"],
  [data-slot="badge"] {
    border-radius: var(--askclaw-radius) !important;
  }

  .border,
  [class*="border-border"] {
    border-color: var(--askclaw-border) !important;
  }

  code,
  pre {
    background: var(--askclaw-bg2) !important;
    border-color: var(--askclaw-border) !important;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --askclaw-bg: #0d0d0d;
      --askclaw-card: #1e1e1e;
      --askclaw-bg2: #1a1a1a;
      --askclaw-bg3: #2a2a2a;
      --askclaw-text: #e0e0e0;
      --askclaw-text2: #aaaaaa;
      --askclaw-text3: #666666;
      --askclaw-accent: #3b82f6;
      --askclaw-accent2: #60a5fa;
      --askclaw-border: #333333;
      --askclaw-input-bg: #1a1a1a;
      --askclaw-shadow: 0 1px 3px rgba(0, 0, 0, 0.30);

      --color-background: #0d0d0d;
      --color-foreground: #e0e0e0;
      --color-card: #1e1e1e;
      --color-card-foreground: #e0e0e0;
      --color-popover: #1a1a1a;
      --color-popover-foreground: #e0e0e0;
      --color-primary: #3b82f6;
      --color-primary-foreground: #ffffff;
      --color-secondary: #1a1a1a;
      --color-secondary-foreground: #e0e0e0;
      --color-muted: #1a1a1a;
      --color-muted-foreground: #aaaaaa;
      --color-accent: #2a2a2a;
      --color-accent-foreground: #e0e0e0;
      --color-border: #333333;
      --color-input: #333333;
      --color-ring: #3b82f6;
    }

    [class*="bg-card"] {
      background: #1e1e1e !important;
    }
  }
